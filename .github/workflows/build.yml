name: package-on-tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.27.9

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build -j

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      # 这里按你的项目改成实际产物名/路径
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/app-linux
          cp -v build/your_app dist/app-linux/
          tar -czf your_app-linux.tar.gz -C dist app-linux

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\app-windows | Out-Null
          Copy-Item -Force build\Release\your_app.exe dist\app-windows\
          Compress-Archive -Force -Path dist\app-windows\* -DestinationPath your_app-windows.zip

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            your_app-linux.tar.gz
            your_app-windows.zip